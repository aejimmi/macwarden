[group]
name = "fmf"
description = "Find My (device and friends location tracking)"
safety = "recommended"
patterns = [
    "com.apple.findmy*",
    "com.apple.FindMyMac*",
    "com.apple.icloud.findmydeviced*",
    "com.apple.findmymacmessenger",
]
cleanup_commands = [
    "rm -rf ~/Library/Caches/com.apple.findmy.fmipcore/",
    "rm -rf ~/Library/Caches/com.apple.findmy/",
]
