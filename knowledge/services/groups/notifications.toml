[group]
name = "notifications"
description = "Push and user notification services"
safety = "keep"
patterns = [
    "com.apple.UserNotificationCenter*",
    "com.apple.usernoted*",
    "com.apple.aps*",
    "com.apple.apsd",
    "com.apple.AOSPushRelay",
]
cleanup_commands = [
    "rm -rf ~/Library/Group\\ Containers/group.com.apple.usernoted/",
]
