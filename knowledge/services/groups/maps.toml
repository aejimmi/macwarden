[group]
name = "maps"
description = "Apple Maps and navigation services"
safety = "recommended"
patterns = [
    "com.apple.Maps*",
    "com.apple.maps.*",
    "com.apple.geod",
    "com.apple.geodMachServiceBridge",
    "com.apple.navd",
]
cleanup_commands = [
    "rm -rf ~/Library/Caches/com.apple.Maps/",
    "rm -rf ~/Library/Caches/GeoServices/",
]
