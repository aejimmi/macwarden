[group]
name = "xcode"
description = "Xcode dev tools — wireless device pairing (port 3722), instruments, simulators"
safety = "optional"
patterns = [
    "com.apple.dt.*",
    "com.apple.CoreDevice.remotepairingd",
    "com.apple.instruments*",
    "com.apple.simulated*",
    "com.apple.testmanagerd*",
    "com.apple.rpmuxd",
]
