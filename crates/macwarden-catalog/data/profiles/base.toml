[profile]
name = "base"
description = "Safe baseline — disables only telemetry-level services"

[rules]
deny = [
    "com.apple.analyticsd",
    "com.apple.diagnosticd.analytics",
]
allow = []

[rules.categories]
telemetry = "deny"
core-os = "allow"

[enforcement]
action = "disable"
exec_policy = "allow"
